openapi: 3.1.0
info:
  title: TrioSense API
  version: 0.1.0
  description: REST control plane for TTD SSD counter operations.

servers:
  - url: http://localhost:8000/api/v1
    description: Local development
  - url: https://api.triosense.in/api/v1
    description: Production

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
    edgeApiKey:
      type: apiKey
      in: header
      name: X-Edge-Api-Key

  schemas:
    ApiMeta:
      type: object
      required: [request_id, timestamp]
      properties:
        request_id:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time

    ApiSuccessEnvelope:
      type: object
      required: [success, data, meta]
      properties:
        success:
          type: boolean
          const: true
        data:
          type: object
        meta:
          $ref: '#/components/schemas/ApiMeta'

    ApiErrorEnvelope:
      type: object
      required: [success, error, meta]
      properties:
        success:
          type: boolean
          const: false
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items:
                type: object
        meta:
          $ref: '#/components/schemas/ApiMeta'

    AuthUser:
      type: object
      required: [user_id, tenant_id, name, email, roles, permissions, locations]
      properties:
        user_id:
          type: integer
        tenant_id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        roles:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string
        locations:
          type: array
          items:
            type: integer

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    LoginResponseData:
      type: object
      required: [token, user, expires_at]
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/AuthUser'
        expires_at:
          type: string
          format: date-time
          nullable: true

    LocationSummary:
      type: object
      required: [location_id, name, short_code, mode, status]
      properties:
        location_id:
          type: integer
        name:
          type: string
        short_code:
          type: string
        mode:
          type: string
        status:
          type: string

    EdgeDeviceState:
      type: object
      required: [device_uid, status]
      properties:
        device_uid:
          type: string
        status:
          type: string
        last_heartbeat_at:
          type: string
          format: date-time
          nullable: true

    LocationState:
      type: object
      required:
        - location_id
        - location_name
        - short_code
        - as_of
        - quota
        - issued
        - tokens_remaining
        - queue_head
        - queue_tail
        - status
        - issuance_rate_per_min
        - arrival_rate_per_min
        - edge_devices
      properties:
        location_id:
          type: integer
        location_name:
          type: string
        short_code:
          type: string
        as_of:
          type: string
          format: date-time
        quota:
          type: integer
        issued:
          type: integer
        tokens_remaining:
          type: integer
        queue_head:
          type: integer
        queue_tail:
          type: integer
        cutoff_position:
          type: integer
          nullable: true
        status:
          type: string
        issuance_rate_per_min:
          type: number
        arrival_rate_per_min:
          type: number
        last_event_at:
          type: string
          format: date-time
          nullable: true
        edge_devices:
          type: array
          items:
            $ref: '#/components/schemas/EdgeDeviceState'

    QueueEventItem:
      type: object
      required: [queue_event_id, event_type, occurred_at, received_at, edge_device_id]
      properties:
        queue_event_id:
          type: integer
        event_type:
          type: string
        occurred_at:
          type: string
          format: date-time
        received_at:
          type: string
          format: date-time
        edge_device_id:
          type: integer
        camera_id:
          type: integer
          nullable: true
        track_id:
          type: string
          nullable: true
        confidence:
          type: number
          nullable: true

    PaginatedQueueEvents:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/QueueEventItem'
        pagination:
          type: object
          required: [current_page, per_page, total, last_page]
          properties:
            current_page:
              type: integer
            per_page:
              type: integer
            total:
              type: integer
            last_page:
              type: integer

    TripwireConfig:
      type: object
      required: [line, direction]
      properties:
        line:
          type: array
          minItems: 2
          maxItems: 2
          items:
            type: array
            items:
              type: integer
        direction:
          type: string
          enum: [up, down, left, right]

    EdgeCameraConfig:
      type: object
      required: [camera_id, name, role, source_type, rtsp_url, status]
      properties:
        camera_id:
          type: integer
        name:
          type: string
        role:
          type: string
          enum: [entry_tripwire, counter_window, density, overview]
        source_type:
          type: string
          enum: [rtsp, webcam]
        rtsp_url:
          type: string
        status:
          type: string
        tripwire:
          $ref: '#/components/schemas/TripwireConfig'

    CameraConfig:
      type: object
      properties:
        camera_id:
          type: integer
        location_id:
          type: integer
        edge_device_id:
          type: integer
        name:
          type: string
        role:
          type: string
          enum: [entry_tripwire, counter_window, density, overview]
        source_type:
          type: string
          enum: [rtsp, webcam]
        rtsp_url:
          type: string
        tripwire:
          $ref: '#/components/schemas/TripwireConfig'
          nullable: true
        status:
          type: string
        last_frame_at:
          type: string
          nullable: true

    UpdateCameraRequest:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
          enum: [entry_tripwire, counter_window, density, overview]
        source_type:
          type: string
          enum: [rtsp, webcam]
        rtsp_url:
          type: string
        tripwire_json:
          $ref: '#/components/schemas/TripwireConfig'
          nullable: true
        status:
          type: string
          enum: [active, degraded, disabled]

    EdgeRuntimeConfig:
      type: object
      properties:
        heartbeat_seconds:
          type: integer
        inference_fps:
          type: integer
        inference_confidence_threshold:
          type: number
        inference_backend:
          type: string
          enum: [cpu, tensorrt, mock]
        stream_backend:
          type: string
          enum: [gstreamer, opencv, mock]
        model_path:
          type: string
        rtsp_reconnect_seconds:
          type: number

    EdgeDeviceConfig:
      type: object
      required: [device_uid, tenant_id, location_id, runtime, cameras]
      properties:
        device_uid:
          type: string
        tenant_id:
          type: integer
        location_id:
          type: integer
        runtime:
          $ref: '#/components/schemas/EdgeRuntimeConfig'
        cameras:
          type: array
          items:
            $ref: '#/components/schemas/EdgeCameraConfig'

    CutoffAccuracySummary:
      type: object
      properties:
        days_with_predictions:
          type: integer
        days_within_tolerance:
          type: integer
        median_delta:
          type: number
          nullable: true
        max_delta:
          type: integer
          nullable: true

    CutoffAccuracyDailyRow:
      type: object
      properties:
        date:
          type: string
          format: date
        mode:
          type: string
        predicted_cutoff_position:
          type: integer
          nullable: true
        actual_closure_position:
          type: integer
          nullable: true
        delta_positions:
          type: integer
          nullable: true
        within_tolerance:
          type: boolean
          nullable: true
        predicted_at:
          type: string
          format: date-time
        closed_at:
          type: string
          format: date-time
          nullable: true
        closed_reason:
          type: string
          nullable: true

    CutoffAccuracyReport:
      type: object
      required: [location_id, from, to, summary, daily]
      properties:
        location_id:
          type: integer
        from:
          type: string
          format: date
        to:
          type: string
          format: date
        summary:
          $ref: '#/components/schemas/CutoffAccuracySummary'
        daily:
          type: array
          items:
            $ref: '#/components/schemas/CutoffAccuracyDailyRow'

    AnnouncementItem:
      type: object
      properties:
        announcement_id:
          type: integer
        language:
          type: string
        text_played:
          type: string
        trigger_type:
          type: string
        status:
          type: string
        played_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true

    CrossCounterRecommendation:
      type: object
      properties:
        source_location_id:
          type: integer
        source_location_name:
          type: string
        target_location_id:
          type: integer
        target_location_name:
          type: string
        target_tokens_remaining:
          type: integer
        target_queue_length:
          type: integer
        buffer:
          type: integer
        message:
          type: string

    CutoffOverrideRequest:
      type: object
      required: [action, reason]
      properties:
        action:
          type: string
          enum: [force_open, force_close, set_cutoff]
        cutoff_position:
          type: integer
          minimum: 1
        reason:
          type: string
          minLength: 5
          maxLength: 500

    UpdateLocationRequest:
      type: object
      properties:
        mode:
          type: string
          enum: [shadow, live, disabled]
        festival_mode:
          type: boolean
        default_quota:
          type: integer
          minimum: 1

    RegisterFcmTokenRequest:
      type: object
      required: [fcm_token]
      properties:
        fcm_token:
          type: string
          maxLength: 255

    PrometheusMetricsResponse:
      type: object
      required: [format, metrics]
      properties:
        format:
          type: string
          const: prometheus_text
        metrics:
          type: string

paths:
  /auth/login:
    post:
      summary: Authenticate an operator
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoginResponseData'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '422':
          description: Validation failed

  /auth/logout:
    post:
      summary: Revoke the current Sanctum token
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Logged out
        '401':
          description: Unauthenticated

  /auth/me:
    get:
      summary: Return the authenticated operator profile
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthUser'
        '401':
          description: Unauthenticated

  /locations:
    get:
      summary: List locations accessible to the caller
      tags: [Locations]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Location list

  /locations/{id}/state:
    get:
      summary: Live state snapshot for a location
      tags: [Locations]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Live state

  /locations/{id}/events:
    get:
      summary: Paginated queue events for a location
      tags: [Locations]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: per_page
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Paginated events

  /edge/{deviceUid}/config:
    get:
      summary: Edge device camera and runtime configuration
      tags: [Edge]
      security:
        - edgeApiKey: []
      parameters:
        - name: deviceUid
          in: path
          required: true
          schema:
            type: string
            example: edge-sim-03
      responses:
        '200':
          description: Edge configuration payload
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/EdgeDeviceConfig'
        '401':
          description: Missing or invalid edge API key
        '404':
          description: Unknown edge device

  /metrics/prometheus:
    get:
      summary: Prometheus-format operational counters
      tags: [Observability]
      responses:
        '200':
          description: Metrics payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrometheusMetricsResponse'

  /locations/{id}:
    get:
      summary: Location detail with live state snapshot
      tags: [Locations]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Location detail
        '401':
          description: Unauthenticated
        '404':
          description: Location not found
    patch:
      summary: Update location mode, festival mode, or default quota
      tags: [Locations]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLocationRequest'
      responses:
        '200':
          description: Updated location
        '401':
          description: Unauthenticated
        '403':
          description: Forbidden
        '422':
          description: Validation failed

  /locations/{id}/cutoff-events:
    get:
      summary: Paginated cutoff decision history
      tags: [Locations]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: per_page
          in: query
          schema:
            type: integer
            default: 50
        - name: mode
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated cutoff events

  /locations/{id}/cutoff-accuracy:
    get:
      summary: Shadow-mode predicted vs actual cutoff accuracy
      tags: [Locations]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Accuracy report
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CutoffAccuracyReport'

  /locations/{id}/cutoff/override:
    post:
      summary: Manual cutoff override (audit-logged)
      tags: [Operator]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CutoffOverrideRequest'
      responses:
        '200':
          description: Updated live state after override
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LocationState'
        '401':
          description: Unauthenticated
        '403':
          description: Forbidden
        '422':
          description: Validation failed

  /locations/{id}/announcements:
    get:
      summary: Paginated announcement playback history
      tags: [Locations]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: per_page
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Announcement history

  /locations/{id}/cameras:
    get:
      summary: List cameras for a location
      tags: [Cameras]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Camera list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          cameras:
                            type: array
                            items:
                              $ref: '#/components/schemas/CameraConfig'

  /locations/{id}/cameras/{cameraId}:
    patch:
      summary: Update camera source, tripwire, or role
      tags: [Cameras]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: cameraId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCameraRequest'
      responses:
        '200':
          description: Updated camera
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CameraConfig'
        '401':
          description: Unauthenticated
        '404':
          description: Camera not found

  /cross-counter/recommendations:
    get:
      summary: Active cross-counter redirection recommendations
      tags: [Locations]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Recommendations list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          recommendations:
                            type: array
                            items:
                              $ref: '#/components/schemas/CrossCounterRecommendation'

  /users/me/fcm-token:
    post:
      summary: Register or update FCM push token for the current user
      tags: [Notifications]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterFcmTokenRequest'
      responses:
        '200':
          description: Token registered
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          registered:
                            type: boolean
                            const: true
        '401':
          description: Unauthenticated
        '422':
          description: Validation failed
