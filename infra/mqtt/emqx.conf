## TrioSense EMQX configuration — local development
## Production uses a separate config with TLS + per-device cert auth.

node {
  name = "emqx@127.0.0.1"
  cookie = "triosense_local_cookie"
  data_dir = "/opt/emqx/data"
}

cluster {
  name = triosense
  discovery_strategy = manual
}

listeners.tcp.default {
  bind = "0.0.0.0:1883"
  max_connections = 10000
}

listeners.ws.default {
  bind = "0.0.0.0:8083"
  websocket.mqtt_path = "/mqtt"
}

dashboard {
  listeners.http {
    bind = 18083
  }
  default_username = "admin"
  default_password = "public"
}

log {
  console_handler {
    level = warning
  }
}

## Allow all in dev only. Production overrides with per-device cert auth.
authorization {
  no_match = allow
  deny_action = ignore
}
