name: Dashboard CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/dashboard/**'
      - '.github/workflows/dashboard.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/dashboard/**'
      - '.github/workflows/dashboard.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/dashboard/package-lock.json

      - name: Install dependencies
        working-directory: apps/dashboard
        run: npm ci

      - name: ESLint
        working-directory: apps/dashboard
        run: npm run lint

      - name: Type check
        working-directory: apps/dashboard
        run: npm run type-check

      - name: Vitest
        working-directory: apps/dashboard
        run: npm test -- --run
