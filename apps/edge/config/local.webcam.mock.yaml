# Mac dev webcam demo — mock inference for ultra-fast UI preview
# Real webcam capture + tripwire; no YOLO CPU load.

device_uid: edge-vsn-01
tenant_id: 1
location_id: 1

inference_fps: 10
preview_fps: 15
inference_confidence_threshold: 0.4
inference_backend: mock
stream_backend: opencv
capture_width: 640
capture_height: 480
inference_width: 640
preview_jpeg_quality: 70
preview_max_width: 640
heartbeat_seconds: 5
buffer_db_path: /tmp/triosense/buffer.sqlite
model_path: yolov8n.pt
rtsp_reconnect_seconds: 3.0

mqtt:
  broker_host: 127.0.0.1
  broker_port: 1883
  client_id: edge-vsn-01
  topic_prefix: triosense
  tls_enabled: false

cameras:
  - camera_id: 1
    name: Mac Webcam Entry
    role: entry_tripwire
    source_type: webcam
    rtsp_url: "0"
    tripwire:
      line: [[67, 160], [360, 160]]
      direction: down
