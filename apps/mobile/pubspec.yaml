name: triosense
description: "TrioSense supervisor app — for TTD EO and shift staff."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Routing
  go_router: ^14.6.0

  # Networking
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Realtime (Reverb is Pusher-protocol compatible)
  pusher_channels_flutter: ^2.2.1

  # Local cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5

  # DI
  get_it: ^8.0.0
  injectable: ^2.5.0

  # Functional
  dartz: ^0.10.1

  # Notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.2.3

  # Utilities
  logger: ^2.4.0
  intl: ^0.20.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  injectable_generator: ^2.6.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
